<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Повтори за роботом</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0f24, #1a1f3a);
      min-height: 100vh; min-height: -webkit-fill-available;
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
      overflow-x: hidden;
    }
    .game {
      text-align: center; color: white;
      width: 100%; max-width: 480px; padding: 1rem;
    }
    h1 { font-size: 2.2rem; margin-bottom: 0.2rem; font-weight: 700; }

    .robot {
      font-size: 6rem; margin: 0.3rem 0;
      display: inline-block;
      transition: transform 0.15s;
    }
    .robot.jump {
      animation: robot-jump 0.45s ease;
    }
    .robot.squash {
      animation: robot-squash 0.45s ease;
    }
    .robot.spin {
      animation: robot-spin 0.55s ease;
    }
    @keyframes robot-jump {
      0%   { transform: translateY(0); }
      40%  { transform: translateY(-35px); }
      100% { transform: translateY(0); }
    }
    @keyframes robot-squash {
      0%   { transform: scaleY(1); }
      50%  { transform: scaleY(0.5); }
      100% { transform: scaleY(1); }
    }
    @keyframes robot-spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .rewards {
      display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
      gap: 0.6rem; min-height: 5rem; margin: 0.5rem 0;
      font-size: 3rem; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 0.5rem;
    }
    .reward-icon {
      animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both,
                 float 2s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes pop-in {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .status { font-size: 2rem; font-weight: bold; margin: 0.8rem 0; color: #FFD700; min-height: 3.5rem; }
    .buttons { display: flex; justify-content: center; gap: 1.2rem; flex-wrap: wrap; margin: 1.5rem 0; }
    .btn {
      width: 100px; height: 100px; border: none; border-radius: 25px;
      font-size: 3rem; background: #2e3b4e; color: white;
      box-shadow: 0 8px 0 #151a24; cursor: pointer;
      transition: all 0.08s ease; -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #151a24; }
    .btn-up    { background: #27ae60; box-shadow: 0 8px 0 #1e8449; }
    .btn-down  { background: #2980b9; box-shadow: 0 8px 0 #1c5980; }
    .btn-spin  { background: #e67e22; box-shadow: 0 8px 0 #b85c10; }
    .btn.lit   { filter: brightness(1.9); transform: scale(1.08); }
    .game.waiting .btn { pointer-events: none; }
    .car-reward { font-size: 3rem; margin-top: 1rem; min-height: 4rem; }
    .error-shake { animation: shake 0.3s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-12px); }
      40%, 80% { transform: translateX(12px); }
    }
    .confetti-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    .confetti {
      position: absolute; font-size: 2rem;
      animation: confetti-fall 1.5s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
<div class="game" id="gameArea">
  <h1>Ян, помоги роботу!</h1>
  <div class="robot" id="robotEmoji">🤖</div>
  <div class="rewards" id="rewardsContainer"></div>
  <div class="status" id="message">Готов? Запоминай!</div>
  <div class="buttons">
    <button class="btn btn-up"   data-index="0">⬆️</button>
    <button class="btn btn-down" data-index="1">⬇️</button>
    <button class="btn btn-spin" data-index="2">🔄</button>
  </div>
  <div class="car-reward" id="carReward"></div>
</div>
<div class="confetti-container" id="confettiContainer"></div>

<script>
  // Аудио
  let audioCtx;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playTone(freq, duration, type='sine', vol=0.25) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  }
  function playSuccess() {
    [523.25, 659.25, 783.99].forEach((f,i)=> setTimeout(()=>playTone(f,0.18,'triangle'), i*130));
  }
  function playLevelUp() {
    [523.25, 659.25, 783.99, 1046.5].forEach((f,i)=> setTimeout(()=>playTone(f,0.2,'triangle',0.3), i*100));
  }
  function playError() { playTone(200, 0.4, 'sawtooth', 0.3); }

  // DOM
  const buttons = document.querySelectorAll('.btn');
  const robotEmoji = document.getElementById('robotEmoji');
  const messageEl = document.getElementById('message');
  const carReward = document.getElementById('carReward');
  const gameDiv = document.getElementById('gameArea');
  const rewardsContainer = document.getElementById('rewardsContainer');
  const confettiContainer = document.getElementById('confettiContainer');

  // Состояние
  let sequence = [];
  let playerIndex = 0;
  let acceptingInput = false;
  let currentLevel = 1;
  let successCount = 0;
  const LEVELS = [3,4,5,6];
  const SUCCESS_NEEDED = 5;

  // Анимация робота
  function animateRobot(actionIndex) {
    robotEmoji.classList.remove('jump', 'squash', 'spin');
    void robotEmoji.offsetWidth;
    if (actionIndex === 0) {
      robotEmoji.classList.add('jump');
    } else if (actionIndex === 1) {
      robotEmoji.classList.add('squash');
    } else if (actionIndex === 2) {
      robotEmoji.classList.add('spin');
    }
    setTimeout(() => robotEmoji.classList.remove('jump', 'squash', 'spin'), 600);
  }

  // Награды
  function getRewardEmoji(level) {
    const emojis = ['⭐', '🌟', '🦄', '🎠'];
    return emojis[Math.min(level-1, emojis.length-1)];
  }
  function addReward(emoji) {
    const icon = document.createElement('span');
    icon.className = 'reward-icon';
    icon.textContent = emoji;
    rewardsContainer.appendChild(icon);
  }
  function clearRewards() {
    rewardsContainer.innerHTML = '';
  }
  function spawnConfetti(count = 40) {
    const emojis = ['🌟','⭐','✨','🎉','🎊'];
    for (let i=0; i<count; i++) {
      const span = document.createElement('span');
      span.className = 'confetti';
      span.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      span.style.left = Math.random()*100 + '%';
      span.style.top = -(Math.random()*20 + 10) + 'px';
      span.style.animationDuration = (Math.random()*1 + 1.5) + 's';
      span.style.fontSize = (Math.random()*2 + 1.5) + 'rem';
      confettiContainer.appendChild(span);
      setTimeout(() => span.remove(), 2000);
    }
  }

  // Показ последовательности
  function showSequence() {
    acceptingInput = false;
    gameDiv.classList.add('waiting');
    // Новая фраза: акцент на движение робота
    messageEl.textContent = '🤖 Смотри, как двигается робот!';
    robotEmoji.textContent = '🤖';
    carReward.textContent = '';

    sequence.forEach((idx, step) => {
      setTimeout(() => {
        lightUpButton(idx);
        animateRobot(idx);
        playTone([350, 450, 550][idx], 0.25);
      }, step * 1000);
    });

    const totalTime = sequence.length * 1000 + 600;
    setTimeout(() => {
      acceptingInput = true;
      gameDiv.classList.remove('waiting');
      messageEl.textContent = '👉 Твоя очередь!';
      robotEmoji.textContent = '😊';
      playerIndex = 0;
    }, totalTime);
  }

  function lightUpButton(index) {
    const btn = document.querySelector(`.btn[data-index="${index}"]`);
    if (!btn) return;
    btn.classList.add('lit');
    setTimeout(() => btn.classList.remove('lit'), 500);
  }

  function generateSequence() {
    const length = LEVELS[currentLevel-1];
    sequence = [];
    for (let i=0; i<length; i++) {
      sequence.push(Math.floor(Math.random()*3));
    }
  }

  function nextRound() {
    successCount++;
    addReward(getRewardEmoji(currentLevel));

    if (successCount >= SUCCESS_NEEDED) {
      if (currentLevel < LEVELS.length) {
        currentLevel++;
        successCount = 0;
        clearRewards();
        addReward(getRewardEmoji(currentLevel));
        messageEl.textContent = '🎉 Новый уровень!';
        robotEmoji.textContent = '🥳';
        playLevelUp();
        spawnConfetti(50);
      } else {
        messageEl.textContent = '🏆 Ты выиграл!';
        robotEmoji.textContent = '🏆';
        playLevelUp();
        spawnConfetti(80);
        setTimeout(resetToLevel1, 3000);
        return;
      }
    } else {
      messageEl.textContent = `✅ Правильно!`;
    }

    generateSequence();
    setTimeout(showSequence, 1200);
  }

  function handlePlayerInput(btnIndex) {
    if (!acceptingInput) return;
    const expected = sequence[playerIndex];
    if (btnIndex === expected) {
      lightUpButton(btnIndex);
      animateRobot(btnIndex);
      playTone([350,450,550][btnIndex], 0.1);
      playerIndex++;
      if (playerIndex === sequence.length) {
        acceptingInput = false;
        messageEl.textContent = '🎉 Молодец! 🚗';
        robotEmoji.textContent = '😊';
        carReward.textContent = '🚗';
        playSuccess();
        setTimeout(nextRound, 1500);
      }
    } else {
      acceptingInput = false;
      // Заменено "Ошибка" на "Внимательнее" с подсказкой
      messageEl.textContent = '❌ Внимательнее! Давай заново. Запоминай кнопки и смотри, как движется робот!';
      robotEmoji.textContent = '😢';
      carReward.textContent = '';
      document.body.classList.add('error-shake');
      playError();
      if (navigator.vibrate) navigator.vibrate(200);
      setTimeout(() => {
        document.body.classList.remove('error-shake');
        resetToLevel1();
      }, 1500);
    }
  }

  function resetToLevel1() {
    currentLevel = 1;
    successCount = 0;
    clearRewards();
    carReward.textContent = '';
    robotEmoji.textContent = '🤖';
    gameDiv.classList.remove('waiting');
    acceptingInput = false;
    messageEl.textContent = 'Готов? Запоминай!';
    generateSequence();
    setTimeout(() => {
      messageEl.textContent = 'Приготовься…';
      playTone(440, 0.1, 'sine', 0.15);
      setTimeout(showSequence, 1200);
    }, 800);
  }

  function startGame() {
    currentLevel = 1;
    successCount = 0;
    clearRewards();
    generateSequence();
    messageEl.textContent = 'Приготовься…';
    robotEmoji.textContent = '🤖';
    setTimeout(() => {
      showSequence();
    }, 1500);
  }

  buttons.forEach(btn => {
    const handler = () => {
      initAudio();
      handlePlayerInput(parseInt(btn.dataset.index, 10));
    };
    btn.addEventListener('click', handler);
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      btn.click();
    });
  });

  window.addEventListener('load', () => {
    initAudio();
    startGame();
  });
</script>
</body>
</html>
