<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Повтори за роботом</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0f24, #1a1f3a);
      min-height: 100vh; min-height: -webkit-fill-available;
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: manipulation; /* убирает задержку на мобильных */
    }
    .game {
      text-align: center; color: white;
      width: 100%; max-width: 480px; padding: 1.5rem;
    }
    h1 { font-size: 2.2rem; margin-bottom: 0.3rem; font-weight: 700; }
    .robot { font-size: 6rem; margin: 0.5rem 0; transition: transform 0.2s; }
    .status {
      font-size: 2rem; font-weight: bold; margin: 0.8rem 0;
      color: #FFD700; min-height: 3.5rem;
    }
    .buttons {
      display: flex; justify-content: center; gap: 1.2rem; flex-wrap: wrap;
      margin: 1.5rem 0;
    }
    .btn {
      width: 100px; height: 100px; border: none; border-radius: 25px;
      font-size: 3rem; background: #2e3b4e; color: white;
      box-shadow: 0 8px 0 #151a24; cursor: pointer;
      transition: all 0.08s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #151a24; }
    .btn-up    { background: #27ae60; box-shadow: 0 8px 0 #1e8449; }
    .btn-down  { background: #2980b9; box-shadow: 0 8px 0 #1c5980; }
    .btn-spin  { background: #e67e22; box-shadow: 0 8px 0 #b85c10; }
    .btn.lit   { filter: brightness(1.9); transform: scale(1.08); }
    .game.waiting .btn { pointer-events: none; } /* блокировка во время показа */
    .car-reward { font-size: 3rem; margin-top: 1rem; min-height: 4rem; }
    .error-shake { animation: shake 0.3s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-12px); }
      40%, 80% { transform: translateX(12px); }
    }
  </style>
</head>
<body>
<div class="game" id="gameArea">
  <h1>Ян, помоги роботу!</h1>
  <div class="robot" id="robotEmoji">🤖</div>
  <div class="status" id="message" role="status">Готов? Смотри!</div>

  <div class="buttons">
    <button class="btn btn-up"   data-index="0">⬆️</button>
    <button class="btn btn-down" data-index="1">⬇️</button>
    <button class="btn btn-spin" data-index="2">🔄</button>
  </div>
  <div class="car-reward" id="carReward"></div>
</div>

<script>
  // --- Аудио ---
  let audioCtx;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, duration, type = 'sine') {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playSuccess() {
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((f, i) => {
      setTimeout(() => playTone(f, 0.18, 'triangle'), i * 130);
    });
  }

  function playError() {
    playTone(200, 0.4, 'sawtooth');
  }

  // --- Состояние игры ---
  const buttons = document.querySelectorAll('.btn');
  const robotEmoji = document.getElementById('robotEmoji');
  const messageEl = document.getElementById('message');
  const carReward = document.getElementById('carReward');
  const gameDiv = document.getElementById('gameArea');

  let sequence = [];        // последовательность индексов
  let playerIndex = 0;     // текущий ожидаемый шаг игрока
  let round = 1;           // счётчик раундов
  let acceptingInput = false; // можно ли нажимать кнопки

  // --- Показать последовательность (робот показывает) ---
  function showSequence() {
    acceptingInput = false;
    gameDiv.classList.add('waiting');   // блокируем касания
    messageEl.textContent = '🤖 Смотри на кнопки!';
    robotEmoji.textContent = '🤖';
    carReward.textContent = '';

    sequence.forEach((idx, step) => {
      setTimeout(() => {
        lightUpButton(idx);
        playTone([350, 450, 550][idx], 0.3);
      }, step * 1000); // 1 секунда между шагами — ребёнок успевает
    });

    // После последней подсветки включаем ввод
    const totalTime = sequence.length * 1000 + 600;
    setTimeout(() => {
      acceptingInput = true;
      gameDiv.classList.remove('waiting');
      messageEl.textContent = '👉 Твоя очередь!';
      robotEmoji.textContent = '😊';
      playerIndex = 0;
    }, totalTime);
  }

  function lightUpButton(index) {
    const btn = document.querySelector(`.btn[data-index="${index}"]`);
    if (!btn) return;
    btn.classList.add('lit');
    setTimeout(() => btn.classList.remove('lit'), 500);
  }

  // --- Переход к следующему раунду ---
  function nextRound() {
    // Добавляем один случайный шаг к последовательности
    sequence.push(Math.floor(Math.random() * 3));
    messageEl.textContent = `⭐ Раунд ${round}`;
    round++;
    showSequence();
  }

  // --- Обработка нажатия игрока ---
  function handlePlayerInput(btnIndex) {
    if (!acceptingInput) return; // идёт показ – не реагируем

    const expected = sequence[playerIndex];

    if (btnIndex === expected) {
      // Правильное нажатие
      lightUpButton(btnIndex);
      playTone([350, 450, 550][btnIndex], 0.12);
      playerIndex++;

      if (playerIndex === sequence.length) {
        // Последовательность пройдена полностью
        acceptingInput = false;
        messageEl.textContent = '🎉 Молодец!';
        robotEmoji.textContent = '😊';
        carReward.textContent = '🚗'; // машинка в награду
        playSuccess();

        // Запускаем следующий раунд через паузу
        setTimeout(() => {
          nextRound();
        }, 1500);
      }
    } else {
      // Ошибка
      acceptingInput = false;
      messageEl.textContent = '❌ Ошибка! Давай ещё раз';
      robotEmoji.textContent = '😢';
      carReward.textContent = '';
      document.body.classList.add('error-shake');
      playError();
      if (navigator.vibrate) navigator.vibrate(200);

      setTimeout(() => {
        document.body.classList.remove('error-shake');
        resetGame();
      }, 1500);
    }
  }

  // --- Сброс игры к первому раунду ---
  function resetGame() {
    sequence = [];
    round = 1;
    playerIndex = 0;
    carReward.textContent = '';
    robotEmoji.textContent = '🤖';
    gameDiv.classList.remove('waiting');
    acceptingInput = false;
    messageEl.textContent = 'Готов? Смотри!';
    setTimeout(() => startGame(), 1000);
  }

  function startGame() {
    // Генерируем первые 3 шага
    for (let i = 0; i < 3; i++) {
      sequence.push(Math.floor(Math.random() * 3));
    }
    round = 1;
    showSequence();
  }

  // --- Привязка событий кнопок ---
  buttons.forEach(btn => {
    const handler = () => {
      initAudio(); // Аудиоконтекст после касания (iOS)
      handlePlayerInput(parseInt(btn.dataset.index, 10));
    };
    btn.addEventListener('click', handler);
    // Убираем задержку на тач-устройствах
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      btn.click();
    });
  });

  // Старт при загрузке
  window.addEventListener('load', () => {
    initAudio();
    resetGame(); // начнёт показ через 1 секунду
  });
</script>
</body>
</html>
