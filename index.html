<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Повтори за роботом</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0f24, #1a1f3a);
      min-height: 100vh; min-height: -webkit-fill-available;
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
      overflow: hidden; /* чтобы конфетти не прокручивалось */
    }
    .game {
      text-align: center; color: white;
      width: 100%; max-width: 480px; padding: 1.5rem;
    }
    h1 { font-size: 2.2rem; margin-bottom: 0.2rem; font-weight: 700; }
    .robot { font-size: 6rem; margin: 0.3rem 0; transition: transform 0.2s; }
    .info {
      display: flex; justify-content: center; gap: 2rem; margin: 0.5rem 0;
      font-size: 1.2rem; font-weight: bold; color: #FFD700;
    }
    .status { font-size: 2rem; font-weight: bold; margin: 0.8rem 0; color: #FFD700; min-height: 3.5rem; }
    .buttons { display: flex; justify-content: center; gap: 1.2rem; flex-wrap: wrap; margin: 1.5rem 0; }
    .btn {
      width: 100px; height: 100px; border: none; border-radius: 25px;
      font-size: 3rem; background: #2e3b4e; color: white;
      box-shadow: 0 8px 0 #151a24; cursor: pointer;
      transition: all 0.08s ease; -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #151a24; }
    .btn-up    { background: #27ae60; box-shadow: 0 8px 0 #1e8449; }
    .btn-down  { background: #2980b9; box-shadow: 0 8px 0 #1c5980; }
    .btn-spin  { background: #e67e22; box-shadow: 0 8px 0 #b85c10; }
    .btn.lit   { filter: brightness(1.9); transform: scale(1.08); }
    .game.waiting .btn { pointer-events: none; }
    .car-reward { font-size: 3rem; margin-top: 1rem; min-height: 4rem; }
    .error-shake { animation: shake 0.3s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-12px); }
      40%, 80% { transform: translateX(12px); }
    }
    /* конфетти */
    .confetti-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    .confetti {
      position: absolute; font-size: 2rem;
      animation: confetti-fall 1.5s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
<div class="game" id="gameArea">
  <h1>Ян, помоги роботу!</h1>
  <div class="robot" id="robotEmoji">🤖</div>
  <div class="info">
    <span>⭐ Уровень <span id="levelDisplay">1</span></span>
    <span>✅ <span id="scoreDisplay">0</span>/3</span>
  </div>
  <div class="status" id="message">Готов? Смотри!</div>
  <div class="buttons">
    <button class="btn btn-up"   data-index="0">⬆️</button>
    <button class="btn btn-down" data-index="1">⬇️</button>
    <button class="btn btn-spin" data-index="2">🔄</button>
  </div>
  <div class="car-reward" id="carReward"></div>
</div>
<!-- Контейнер для конфетти -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
  // --- Аудио ---
  let audioCtx;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playTone(freq, duration, type='sine', vol=0.25) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  }
  function playSuccess() { // победа в раунде
    [523.25, 659.25, 783.99].forEach((f,i)=> setTimeout(()=>playTone(f,0.18,'triangle'), i*130));
  }
  function playLevelUp() { // фанфары при повышении уровня
    [523.25, 659.25, 783.99, 1046.5].forEach((f,i)=> setTimeout(()=>playTone(f,0.2,'triangle',0.3), i*100));
  }
  function playError() { playTone(200, 0.4, 'sawtooth', 0.3); }

  // --- Элементы ---
  const buttons = document.querySelectorAll('.btn');
  const robotEmoji = document.getElementById('robotEmoji');
  const messageEl = document.getElementById('message');
  const carReward = document.getElementById('carReward');
  const gameDiv = document.getElementById('gameArea');
  const levelDisplay = document.getElementById('levelDisplay');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const confettiContainer = document.getElementById('confettiContainer');

  // --- Состояние ---
  let sequence = [];           // индексы кнопок текущей последовательности
  let playerIndex = 0;        // какой шаг ждём
  let acceptingInput = false; // можно ли нажимать
  let currentLevel = 1;       // уровень (1..4, длина 3..6)
  let successCount = 0;       // правильных повторений на текущем уровне (0..2)
  const LEVELS = [3,4,5,6];   // длина последовательности для уровней 1-4

  // --- Конфетти ---
  function spawnConfetti(count = 40) {
    const emojis = ['🌟','⭐','✨','🎉','🎊'];
    for (let i=0; i<count; i++) {
      const span = document.createElement('span');
      span.className = 'confetti';
      span.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      span.style.left = Math.random()*100 + '%';
      span.style.top = -(Math.random()*20 + 10) + 'px';
      span.style.animationDuration = (Math.random()*1 + 1.5) + 's';
      span.style.fontSize = (Math.random()*2 + 1.5) + 'rem';
      confettiContainer.appendChild(span);
      // удаляем после анимации
      setTimeout(() => span.remove(), 2000);
    }
  }

  // --- Показать последовательность ---
  function showSequence() {
    acceptingInput = false;
    gameDiv.classList.add('waiting');
    messageEl.textContent = '🤖 Смотри на кнопки!';
    robotEmoji.textContent = '🤖';
    carReward.textContent = '';

    sequence.forEach((idx, step) => {
      setTimeout(() => {
        lightUpButton(idx);
        playTone([350, 450, 550][idx], 0.25);
      }, step * 1000);
    });

    const totalTime = sequence.length * 1000 + 600;
    setTimeout(() => {
      acceptingInput = true;
      gameDiv.classList.remove('waiting');
      messageEl.textContent = '👉 Твоя очередь!';
      robotEmoji.textContent = '😊';
      playerIndex = 0;
    }, totalTime);
  }

  function lightUpButton(index) {
    const btn = document.querySelector(`.btn[data-index="${index}"]`);
    if (!btn) return;
    btn.classList.add('lit');
    setTimeout(() => btn.classList.remove('lit'), 500);
  }

  // --- Генерация новой последовательности для текущего уровня ---
  function generateSequence() {
    const length = LEVELS[currentLevel-1]; // длина для текущего уровня
    sequence = [];
    for (let i=0; i<length; i++) {
      sequence.push(Math.floor(Math.random()*3));
    }
  }

  // --- Следующий раунд (после правильного повторения) ---
  function nextRound() {
    successCount++;
    scoreDisplay.textContent = successCount;

    if (successCount >= 3) {
      // повышение уровня
      if (currentLevel < LEVELS.length) {
        currentLevel++;
        levelDisplay.textContent = currentLevel;
        successCount = 0;
        scoreDisplay.textContent = '0';
        messageEl.textContent = '🎉 Новый уровень!';
        robotEmoji.textContent = '🥳';
        playLevelUp();
        spawnConfetti(50);
      } else {
        // максимальный уровень, игра пройдена
        messageEl.textContent = '🏆 Ты выиграл!';
        robotEmoji.textContent = '🏆';
        playLevelUp();
        spawnConfetti(80);
        // сбросить на первый уровень через паузу
        setTimeout(resetToLevel1, 3000);
        return;
      }
    } else {
      messageEl.textContent = `✅ Правильно! Ещё ${3-successCount} раз(а)`;
    }

    // генерируем новую последовательность той же длины
    generateSequence();
    setTimeout(showSequence, 1200);
  }

  // --- Обработка нажатия игрока ---
  function handlePlayerInput(btnIndex) {
    if (!acceptingInput) return;
    const expected = sequence[playerIndex];
    if (btnIndex === expected) {
      lightUpButton(btnIndex);
      playTone([350,450,550][btnIndex], 0.1);
      playerIndex++;
      if (playerIndex === sequence.length) {
        acceptingInput = false;
        messageEl.textContent = '🎉 Молодец! 🚗';
        robotEmoji.textContent = '😊';
        carReward.textContent = '🚗';
        playSuccess();
        setTimeout(nextRound, 1500);
      }
    } else {
      // ошибка
      acceptingInput = false;
      messageEl.textContent = '❌ Ошибка! Начинаем заново';
      robotEmoji.textContent = '😢';
      carReward.textContent = '';
      document.body.classList.add('error-shake');
      playError();
      if (navigator.vibrate) navigator.vibrate(200);
      setTimeout(() => {
        document.body.classList.remove('error-shake');
        resetToLevel1();
      }, 1500);
    }
  }

  function resetToLevel1() {
    currentLevel = 1;
    successCount = 0;
    levelDisplay.textContent = '1';
    scoreDisplay.textContent = '0';
    carReward.textContent = '';
    robotEmoji.textContent = '🤖';
    gameDiv.classList.remove('waiting');
    acceptingInput = false;
    messageEl.textContent = 'Готов? Смотри!';
    generateSequence();
    setTimeout(showSequence, 1000);
  }

  // --- Старт ---
  function startGame() {
    currentLevel = 1;
    successCount = 0;
    levelDisplay.textContent = '1';
    scoreDisplay.textContent = '0';
    generateSequence();
    showSequence();
  }

  // --- Привязка событий ---
  buttons.forEach(btn => {
    const handler = () => {
      initAudio();
      handlePlayerInput(parseInt(btn.dataset.index, 10));
    };
    btn.addEventListener('click', handler);
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      btn.click();
    });
  });

  window.addEventListener('load', () => {
    initAudio();
    startGame();
  });
</script>
</body>
</html>
