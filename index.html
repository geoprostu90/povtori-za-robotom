<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Повтори за роботом</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0f24, #1a1f3a);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
    }
    .game {
      text-align: center; color: white;
      width: 100%; max-width: 480px; padding: 1rem;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .status { font-size: 1.8rem; font-weight: bold; color: #FFD700; min-height: 3rem; margin: 0.5rem 0; }
    .grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.3rem;
      width: 280px; height: 280px; margin: 1rem auto;
      background: rgba(255,255,255,0.1); border-radius: 16px; padding: 0.5rem;
    }
    .cell {
      background: rgba(255,255,255,0.15); border-radius: 12px;
      position: relative;
      transition: background 0.2s;
    }
    .cell.path {
      background: rgba(255, 215, 0, 0.3);
    }
    .robot-emoji {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 2.5rem; transition: top 0.4s ease, left 0.4s ease;
      pointer-events: none;
    }
    .rewards {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem;
      font-size: 2rem; min-height: 3rem; margin: 0.5rem 0;
    }
    .reward-icon {
      animation: pop-in 0.3s ease both, float 2s infinite;
    }
    @keyframes pop-in { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .buttons { display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
    .btn {
      width: 65px; height: 65px; border: none; border-radius: 15px;
      font-size: 2.2rem; background: #2e3b4e; color: white;
      box-shadow: 0 6px 0 #151a24; cursor: pointer; transition: all 0.08s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #151a24; }
    .btn.lit { filter: brightness(1.8); transform: scale(1.05); }
    .game.waiting .btn { pointer-events: none; }
    .error-shake { animation: shake 0.3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  </style>
</head>
<body>
<div class="game" id="gameArea">
  <h1>Ян, помоги роботу!</h1>
  <div class="status" id="message">Готов? Запоминай!</div>
  <div class="grid" id="grid">
    <!-- 16 клеток, робот вставляется динамически -->
  </div>
  <div class="rewards" id="rewardsContainer"></div>
  <div class="buttons" id="buttonsContainer">
    <button class="btn" data-dir="up">⬆️</button>
    <button class="btn" data-dir="down">⬇️</button>
    <button class="btn" data-dir="left">⬅️</button>
    <button class="btn" data-dir="right">➡️</button>
  </div>
</div>

<script>
  // Audio
  let audioCtx;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playTone(f,d,t='sine',v=0.25) {
    if (!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(v,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+d);
    o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);
  }
  function playSuccess(){ [523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,0.15,'triangle'),i*100)); }
  function playLevelUp(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,'triangle',0.3),i*80)); }
  function playError(){ playTone(200,0.5,'sawtooth',0.3); }

  // Grid & robot
  const grid = document.getElementById('grid');
  const robotEmoji = document.createElement('div');
  robotEmoji.className = 'robot-emoji';
  robotEmoji.textContent = '🤖';
  grid.appendChild(robotEmoji);

  const COLS = 4, ROWS = 4;
  let robotPos = { x: 1, y: 1 }; // старт в центре 4x4

  function updateRobotPosition() {
    const cellSize = grid.clientWidth / COLS;
    const left = robotPos.x * cellSize + cellSize/2;
    const top = robotPos.y * cellSize + cellSize/2;
    robotEmoji.style.left = left + 'px';
    robotEmoji.style.top = top + 'px';
  }

  // Отрисовка сетки (клетки статичны)
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.x = c;
      cell.dataset.y = r;
      grid.appendChild(cell);
    }
  }

  // Подсветка клетки пути
  function highlightCell(x,y, on) {
    const cell = grid.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
    if (cell) cell.classList.toggle('path', on);
  }

  // Очистить весь путь
  function clearPath() {
    grid.querySelectorAll('.cell.path').forEach(c => c.classList.remove('path'));
  }

  // Проверка границ
  function canMove(dir) {
    let nx=robotPos.x, ny=robotPos.y;
    if (dir==='up') ny--;
    else if (dir==='down') ny++;
    else if (dir==='left') nx--;
    else if (dir==='right') nx++;
    return nx>=0 && nx<COLS && ny>=0 && ny<ROWS;
  }

  // Перемещение робота с анимацией
  function moveRobot(dir) {
    return new Promise(resolve => {
      if (!canMove(dir)) { resolve(false); return; }
      let nx=robotPos.x, ny=robotPos.y;
      if (dir==='up') ny--;
      else if (dir==='down') ny++;
      else if (dir==='left') nx--;
      else if (dir==='right') nx++;
      // Подсветим старую клетку как путь
      highlightCell(robotPos.x, robotPos.y, true);
      robotPos.x = nx; robotPos.y = ny;
      updateRobotPosition();
      playTone(dir==='up'?400:dir==='down'?300:dir==='left'?350:450, 0.1);
      setTimeout(resolve, 400); // ждём завершения анимации transition
    });
  }

  // Состояние игры
  let sequence = [];          // массив направлений
  let playerStep = 0;
  let acceptingInput = false;
  let currentLevel = 1;
  let successCount = 0;
  const LEVELS = [3,4,5,6];  // длина последовательности
  const SUCCESS_NEEDED = 5;

  // Награды
  function getRewardEmoji(level) {
    return ['⭐','🌟','🦄','🎠'][Math.min(level-1,3)];
  }
  function addReward() {
    const span = document.createElement('span');
    span.className = 'reward-icon';
    span.textContent = getRewardEmoji(currentLevel);
    document.getElementById('rewardsContainer').appendChild(span);
  }
  function clearRewards() {
    document.getElementById('rewardsContainer').innerHTML = '';
  }

  // Показ последовательности (робот ползёт)
  async function showSequence() {
    const gameDiv = document.getElementById('gameArea');
    gameDiv.classList.add('waiting');
    document.getElementById('message').textContent = '🤖 Смотри, куда ползёт!';
    clearPath();
    // Ставим робота в центр
    robotPos = { x:1, y:1 };
    updateRobotPosition();
    highlightCell(1,1,true);
    await new Promise(r => setTimeout(r, 600));

    for (const dir of sequence) {
      await moveRobot(dir);
      await new Promise(r => setTimeout(r, 200)); // пауза между шагами
    }
    // После показа ждём и включаем ввод
    await new Promise(r => setTimeout(r, 600));
    document.getElementById('message').textContent = '👉 Твоя очередь!';
    gameDiv.classList.remove('waiting');
    acceptingInput = true;
    playerStep = 0;
    // Возвращаем робота в стартовую позицию для игрока
    robotPos = { x:1, y:1 };
    updateRobotPosition();
    clearPath();
    highlightCell(1,1,true);
  }

  // Генерация последовательности
  function generateSequence() {
    const dirs = ['up','down','left','right'];
    const len = LEVELS[currentLevel-1];
    sequence = [];
    // Генерируем с учётом границ, чтобы робот не выходил за поле
    let x=1, y=1;
    for (let i=0; i<len; i++) {
      const possible = dirs.filter(d => {
        let nx=x, ny=y;
        if (d==='up') ny--; else if (d==='down') ny++; else if (d==='left') nx--; else if (d==='right') nx++;
        return nx>=0 && nx<COLS && ny>=0 && ny<ROWS;
      });
      const dir = possible[Math.floor(Math.random()*possible.length)];
      sequence.push(dir);
      if (dir==='up') y--; else if (dir==='down') y++; else if (dir==='left') x--; else if (dir==='right') x++;
    }
  }

  // Обработка нажатия игрока
  async function handleInput(dir) {
    if (!acceptingInput) return;
    const expected = sequence[playerStep];
    if (dir !== expected) {
      acceptingInput = false;
      document.getElementById('message').textContent = '❌ Внимательнее! Давай заново.';
      document.body.classList.add('error-shake');
      playError();
      if (navigator.vibrate) navigator.vibrate(200);
      setTimeout(() => {
        document.body.classList.remove('error-shake');
        resetToLevel1();
      }, 1500);
      return;
    }
    // Правильный шаг
    await moveRobot(dir);
    playerStep++;
    if (playerStep === sequence.length) {
      // Последовательность пройдена
      acceptingInput = false;
      document.getElementById('message').textContent = '🎉 Молодец! 🚗';
      playSuccess();
      addReward();
      successCount++;
      if (successCount >= SUCCESS_NEEDED) {
        if (currentLevel < LEVELS.length) {
          currentLevel++;
          successCount = 0;
          clearRewards();
          addReward();
          document.getElementById('message').textContent = '🎉 Новый уровень!';
          playLevelUp();
        } else {
          document.getElementById('message').textContent = '🏆 Ты выиграл!';
          playLevelUp();
          setTimeout(resetToLevel1, 3000);
          return;
        }
      }
      // Подготовка к следующему раунду
      setTimeout(() => {
        clearPath();
        robotPos = { x:1, y:1 };
        updateRobotPosition();
        highlightCell(1,1,true);
        generateSequence();
        setTimeout(showSequence, 1500);
      }, 1500);
    }
  }

  function resetToLevel1() {
    currentLevel = 1;
    successCount = 0;
    clearRewards();
    document.getElementById('message').textContent = 'Готов? Запоминай!';
    clearPath();
    robotPos = { x:1, y:1 };
    updateRobotPosition();
    highlightCell(1,1,true);
    generateSequence();
    setTimeout(showSequence, 2000);
  }

  function startGame() {
    currentLevel = 1;
    successCount = 0;
    clearRewards();
    generateSequence();
    setTimeout(showSequence, 1500);
  }

  // Кнопки
  document.querySelectorAll('.btn').forEach(btn => {
    const dir = btn.dataset.dir;
    btn.addEventListener('click', () => { initAudio(); handleInput(dir); });
    btn.addEventListener('touchstart', e => { e.preventDefault(); btn.click(); });
  });

  window.addEventListener('load', () => {
    initAudio();
    updateRobotPosition();
    startGame();
  });
</script>
</body>
</html>
