<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Повтори за роботом</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0f24, #1a1f3a);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, sans-serif;
    }
    .game {
      text-align: center; color: white;
      max-width: 480px; padding: 2rem;
    }
    h1 { font-size: 2rem; margin-bottom: 1.5rem; }
    .robot { font-size: 4rem; margin-bottom: 1rem; transition: transform 0.2s; }
    .buttons {
      display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;
    }
    .btn {
      width: 90px; height: 90px; border: none; border-radius: 20px;
      font-size: 2.5rem; background: #2e3b4e; color: white;
      box-shadow: 0 6px 0 #151a24; cursor: pointer;
      transition: 0.1s linear;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #151a24; }
    .btn.green  { background: #27ae60; box-shadow: 0 6px 0 #1e8449; }
    .btn.blue   { background: #2980b9; box-shadow: 0 6px 0 #1c5980; }
    .btn.orange { background: #e67e22; box-shadow: 0 6px 0 #b85c10; }
    .btn.lit    { filter: brightness(1.6); transform: scale(1.05); }
    .message { font-size: 1.5rem; margin: 1.5rem 0 0.5rem; min-height: 2.5rem; }
    .score { font-size: 1.2rem; color: #aaa; margin-bottom: 0.5rem; }
    .error-shake { animation: shake 0.3s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-10px); }
      40%, 80% { transform: translateX(10px); }
    }
  </style>
</head>
<body>
<div class="game">
  <div class="robot" id="robotEmoji">🤖</div>
  <h1>Ян, помоги роботу!</h1>
  <div class="score" id="scoreDisplay">Раунд: 1</div>
  <div class="buttons" id="buttonsContainer">
    <button class="btn green"  data-index="0">⬆️</button>
    <button class="btn blue"   data-index="1">⬇️</button>
    <button class="btn orange" data-index="2">🔄</button>
  </div>
  <div class="message" id="message"></div>
</div>

<script>
  // --- Web Audio ---
  let audioCtx;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, duration, type = 'sine') {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playSuccess() { // мелодия победы
    [523.25, 659.25, 783.99].forEach((f, i) => {
      setTimeout(() => playTone(f, 0.15, 'triangle'), i * 120);
    });
  }

  function playError() { playTone(200, 0.3, 'sawtooth'); }

  // --- Игра ---
  const buttons = document.querySelectorAll('.btn');
  const robotEmoji = document.getElementById('robotEmoji');
  const messageEl = document.getElementById('message');
  const scoreEl = document.getElementById('scoreDisplay');

  let sequence = [];          // текущая последовательность
  let playerIndex = 0;       // какой шаг ждём от игрока
  let round = 1;             // номер раунда
  let acceptingInput = false;// можно ли нажимать кнопки сейчас

  // --- Показать последовательность ---
  function showSequence() {
    acceptingInput = false;  // блокируем ввод на время показа
    messageEl.textContent = 'Смотри!';
    sequence.forEach((btnIndex, i) => {
      setTimeout(() => {
        lightUpButton(btnIndex);
        playTone([400, 500, 600][btnIndex], 0.2, 'square');
      }, i * 800); // интервал между подсветками
    });
    // После показа последней кнопки включаем ввод
    const totalTime = sequence.length * 800 + 300;
    setTimeout(() => {
      acceptingInput = true;
      messageEl.textContent = 'Повтори!';
      playerIndex = 0;
    }, totalTime);
  }

  // Подсветить кнопку на короткое время
  function lightUpButton(index) {
    const btn = document.querySelector(`.btn[data-index="${index}"]`);
    btn.classList.add('lit');
    setTimeout(() => btn.classList.remove('lit'), 400);
  }

  // --- Следующий раунд ---
  function nextRound() {
    const moves = [0, 1, 2];
    const newStep = moves[Math.floor(Math.random() * moves.length)];
    sequence.push(newStep);  // добавляем случайный шаг
    scoreEl.textContent = `Раунд: ${round}`;
    round++;
    showSequence();
  }

  // --- Обработка нажатия игрока ---
  function handlePlayerInput(btnIndex) {
    if (!acceptingInput) return; // ещё идёт показ
    const expected = sequence[playerIndex];
    if (btnIndex === expected) {
      // верный шаг
      lightUpButton(btnIndex);
      playTone([400, 500, 600][btnIndex], 0.1);
      playerIndex++;
      if (playerIndex === sequence.length) {
        // вся последовательность пройдена
        acceptingInput = false;
        messageEl.textContent = 'Правильно! 🚗';
        robotEmoji.textContent = '😊';
        playSuccess();
        setTimeout(nextRound, 1200);
      }
    } else {
      // ошибка
      acceptingInput = false;
      messageEl.textContent = 'Ошибка 😢 попробуй снова';
      robotEmoji.textContent = '😢';
      document.body.classList.add('error-shake');
      playError();
      if (navigator.vibrate) navigator.vibrate(200); // вибро (Android)
      setTimeout(() => document.body.classList.remove('error-shake'), 300);
      // сброс игры
      resetGame();
    }
  }

  // Сброс и старт заново
  function resetGame() {
    sequence = [];
    round = 1;
    playerIndex = 0;
    scoreEl.textContent = 'Раунд: 1';
    robotEmoji.textContent = '🤖';
    setTimeout(() => {
      messageEl.textContent = '';
      startGame();
    }, 1500);
  }

  // Запуск игры
  function startGame() {
    // Первый раз показываем последовательность из 3 шагов
    for (let i = 0; i < 3; i++) {
      const r = Math.floor(Math.random() * 3);
      sequence.push(r);
    }
    round = 1;  // будет 1
    showSequence();
  }

  // Навешиваем обработчики на кнопки
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      initAudio(); // активируем аудио после первого касания (iOS)
      const index = parseInt(btn.dataset.index, 10);
      handlePlayerInput(index);
    });
    // Для мобильных: предотвращаем двойное срабатывание
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      btn.click();
    });
  });

  // Старт при загрузке
  window.addEventListener('load', () => {
    initAudio();
    resetGame(); // она вызовет startGame после небольшой паузы
  });
</script>
</body>
</html>
